<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Product preview card component</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">

 
</head>
<body>
  <div class="container">
    <main>
      
 <picture>
  <!-- Image for large screens -->
  <source media="(min-width: 1000px)" srcset="images/image-product-desktop.jpg">
  
  
  <!-- Fallback img tag -->
  <img src="images/image-product-mobile.jpg" alt="Bottle of Gabrielle Essence Eau De Parfum"/>
</picture>

  <div id="text">
  <h1 id="heading1">PERFUME</h1>

  <h2 id="heading2">Gabrielle Essence Eau De Parfum</h2>

 <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.</p> 

 <div id="prices"><span id="sale">$149.99</span> <span id="original">$169.99</span></div> 

  <button> <img src="images/icon-cart.svg" alt="" class="btn-icon">Add to Cart</button>

  </div>
  </main>
  </div>

</body>
</html>
